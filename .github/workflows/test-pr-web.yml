name: CI — PR a dev (frontend)

on:
  pull_request:
    branches: [dev]

jobs:
  unit-tests:
    name: Pruebas unitarias frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test -- --run
